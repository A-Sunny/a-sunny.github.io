<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River Coordinate Verifier</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ SIDEBAR DRAWER ============ -->
  <aside id="sidebar" class="sidebar">

    <!-- Sidebar header / toggle target -->
    <div class="sidebar-header">
      <h1 class="sidebar-title">River Verifier</h1>
      <button id="closeSidebarBtn" class="sidebar-close" title="Collapse panel">&times;</button>
    </div>

    <!-- URL Input -->
    <div class="sidebar-section">
      <label for="urlInput">GitHub JSON URL</label>
      <textarea
        id="urlInput"
        rows="2"
        placeholder="https://github.com/user/repo/blob/main/path/to/river.json"
        spellcheck="false"
      ></textarea>

      <div class="button-row">
        <button id="loadBtn" class="btn btn-primary">Load</button>
        <button id="clearBtn" class="btn btn-secondary">Clear</button>
      </div>

      <p class="hint">Drag &amp; drop JSON or press Ctrl+Enter</p>
    </div>

    <!-- Status -->
    <div id="statusBar" class="status-bar"></div>

    <!-- Info Panel (verification stats only) -->
    <div id="infoPanel" class="info-panel hidden">
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Points</span>
          <span id="infoPoints" class="info-value">&mdash;</span>
        </div>
        <div class="info-item">
          <span class="info-label">Length</span>
          <span id="infoLength" class="info-value">&mdash;</span>
        </div>
        <div class="info-item">
          <span class="info-label">Fetch</span>
          <span id="infoFetchTime" class="info-value">&mdash;</span>
        </div>
        <div class="info-item">
          <span class="info-label">Render</span>
          <span id="infoRenderTime" class="info-value">&mdash;</span>
        </div>
      </div>

      <div class="info-item info-bbox-item">
        <span class="info-label">Bounding Box</span>
        <span id="infoBbox" class="info-value info-value-mono">&mdash;</span>
      </div>

      <div class="tools-row">
        <button id="zoomBtn" class="btn btn-small btn-secondary" disabled>Zoom to Fit</button>
        <label class="toggle-label">
          <input type="checkbox" id="toggleMarkers" checked>
          <span>Markers</span>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="togglePointNumbers">
          <span>Point #s</span>
        </label>
      </div>

      <div class="tools-row tools-row-alt">
        <label class="toggle-label">
          <input type="checkbox" id="toggleDarkMode">
          <span>Dark Mode</span>
        </label>
        <button id="copyStatsBtn" class="btn btn-small btn-secondary">Copy Stats</button>
        <button id="exportPngBtn" class="btn btn-small btn-secondary">Export PNG</button>
      </div>
    </div>

  </aside>

  <!-- ============ OPEN SIDEBAR BUTTON (shown when collapsed) ============ -->
  <button id="openSidebarBtn" class="sidebar-open-btn hidden" title="Open panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <!-- ============ COORDINATE INSPECTOR ============ -->
  <div id="coordInspector" class="coord-inspector hidden">
    <div class="coord-inspector-header">Inspector</div>
    <div><span class="ci-label">Index:</span> <span id="ciIndex">&mdash;</span></div>
    <div><span class="ci-label">Lat:</span> <span id="ciLat">&mdash;</span></div>
    <div><span class="ci-label">Lng:</span> <span id="ciLng">&mdash;</span></div>
  </div>

  <!-- ============ MAP ============ -->
  <div id="map" class="map-container"></div>

  <!-- ============ HOVER COORDINATES ============ -->
  <div id="hoverCoords" class="hover-coords hidden">
    <span id="hoverLat"></span>, <span id="hoverLng"></span>
  </div>

  <!-- ============ DRAG & DROP OVERLAY ============ -->
  <div id="dropOverlay" class="drop-overlay hidden">
    <div class="drop-overlay-text">Drop JSON file here</div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- html2canvas for PNG export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
